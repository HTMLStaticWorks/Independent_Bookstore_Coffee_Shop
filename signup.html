<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Sip & Scroll</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-orange-50 dark:bg-black text-gray-800 dark:text-gray-100 antialiased transition-colors duration-300 min-h-screen flex flex-col relative">

    <!-- Top Navigation (Outside Container) -->
    <header class="w-full px-6 py-4 flex justify-end items-center relative z-20">
        <div class="flex flex-col items-end gap-1">
            <button onclick="toggleTheme()" class="text-gray-500 dark:text-gray-400 hover:text-orange-600 dark:hover:text-orange-400 p-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-all" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-lg"></i>
            </button>
            <button onclick="toggleRTL()" class="text-gray-500 dark:text-gray-400 hover:text-orange-600 dark:hover:text-orange-400 px-2 py-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-all font-bold text-xs" aria-label="Toggle RTL/LTR">
                <span class="rtl-icon-ltr">RTL</span>
                <span class="rtl-icon-rtl hidden">LTR</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8 relative overflow-hidden">
        
        <!-- Abstract Background Elements -->
        <div class="absolute top-0 right-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-orange-200 dark:bg-orange-900/20 rounded-full mix-blend-multiply dark:mix-blend-overlay filter blur-3xl opacity-50"></div>
            <div class="absolute top-20 right-10 w-64 h-64 bg-teal-200 dark:bg-teal-900/20 rounded-full mix-blend-multiply dark:mix-blend-overlay filter blur-3xl opacity-40"></div>
        </div>

        <!-- Signup Card -->
        <div class="bg-white dark:bg-gray-900 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden relative z-10 border border-gray-100 dark:border-gray-700">
            
            <div class="p-8 md:p-10">
                <div class="text-center mb-8">
                    <a href="index.html" class="inline-flex items-center justify-center gap-2 group mb-6">
                        <i class="fa-solid fa-book-open text-orange-600 text-3xl group-hover:text-orange-700 transition-colors"></i>
                        <span class="font-heading text-2xl md:text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Sip & Scroll</span>
                    </a>
                    <h1 class="font-heading text-3xl font-bold text-gray-900 dark:text-white mb-2">Join the Club</h1>
                    <p class="text-gray-500 dark:text-gray-400">Create an account to earn points on every coffee and book purchase.</p>
                </div>

                <form class="space-y-6" action="dashboard.html" method="GET">
                    
                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label for="firstName" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">First Name</label>
                            <input type="text" id="firstName" required placeholder="Jane" class="w-full px-4 py-3 bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-gray-900 dark:text-white transition shadow-sm">
                        </div>
                        <div>
                            <label for="lastName" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Last Name</label>
                            <input type="text" id="lastName" required placeholder="Doe" class="w-full px-4 py-3 bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-gray-900 dark:text-white transition shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-envelope text-gray-400"></i>
                            </div>
                            <input type="email" id="email" required placeholder="name@example.com" class="pl-10 w-full px-4 py-3 bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-gray-900 dark:text-white transition shadow-sm">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" required placeholder="Create a strong password" class="pl-10 w-full px-4 py-3 bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-gray-900 dark:text-white transition shadow-sm">
                        </div>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Must be at least 8 characters long.</p>
                    </div>

                    <div class="flex items-start">
                        <input id="terms" type="checkbox" required class="mt-1 h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300 rounded bg-gray-50 dark:bg-black dark:border-gray-700 dark:checked:bg-orange-600 shrink-0">
                        <label for="terms" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
                            I agree to the <a href="#" class="text-orange-600 hover:text-orange-700 dark:text-orange-400 dark:hover:text-orange-300 underline">Terms of Service</a> and <a href="#" class="text-orange-600 hover:text-orange-700 dark:text-orange-400 dark:hover:text-orange-300 underline">Privacy Policy</a>.
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-md shadow-md transition-all hover:shadow-lg hover:-translate-y-0.5 mt-2">
                        Create Account
                    </button>
                </form>

                <div class="mt-8 relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-900 text-gray-500 dark:text-gray-400">Or register with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-4">
                    <button type="button" class="w-full inline-flex justify-center items-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors gap-2">
                        <i class="fa-brands fa-google text-red-500 text-lg"></i>
                        Google
                    </button>
                    <button type="button" class="w-full inline-flex justify-center items-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors gap-2">
                        <i class="fa-brands fa-apple text-gray-900 dark:text-white text-lg"></i>
                        Apple
                    </button>
                </div>
            </div>
            
            <div class="px-8 py-5 bg-gray-50 dark:bg-gray-700/50 border-t border-gray-100 dark:border-gray-700 text-center">
                <p class="text-sm text-gray-600 dark:text-gray-400">
                    Already have an account? 
                    <a href="login.html" class="font-bold text-orange-600 hover:text-orange-700 dark:text-orange-400 dark:hover:text-orange-300 transition-colors">Log in</a>
                </p>
            </div>
        </div>

    </main>

    <!-- Global Javascript -->
    <script src="script.js"></script>
</body>
</html>
